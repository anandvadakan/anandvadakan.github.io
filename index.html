<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anand V - Business Analyst</title>
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect) {
          var search = redirect.slice(1).split('&').reduce(function(o, v) {
            var pair = v.split('=');
            o[pair[0]] = pair.slice(1).join('=').replace(/~and~/g, '&');
            return o;
          }, {});
          if (search.p !== undefined) {
            window.history.replaceState(
              null, null,
              '/Portfolio/' + (search.p || '') + (search.q ? '?' + search.q : '') + (redirect.split('#')[1] ? '#' + redirect.split('#')[1] : '')
            );
          }
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
